<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin — Manage Brands | Obwocha's Pharmacy</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .admin-panel { max-width: 950px; margin: 0 auto; padding: 20px; }
  .admin-panel h2 { color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .admin-card { background: #fff; border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .admin-card h3 { color: var(--primary); margin-bottom: 14px; font-size: 16px; }
  .admin-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .admin-form label { font-size: 13px; color: var(--text-light); display: block; margin-bottom: 4px; }
  .admin-form .field { flex: 1; min-width: 150px; }
  .admin-form input, .admin-form select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; box-sizing:border-box; }
  .admin-form input:focus { border-color: var(--primary); outline: none; }
  .brands-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .brand-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg-light); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); gap: 10px; }
  .brand-item .info { display: flex; align-items: center; gap: 10px; flex:1; min-width:0; }
  .brand-item .brand-img { width: 44px; height: 44px; border-radius: 6px; overflow: hidden; flex-shrink:0; background:#e8f5e9; display:flex; align-items:center; justify-content:center; }
  .brand-item .brand-img img { width: 100%; height: 100%; object-fit: contain; }
  .brand-item .brand-img .icon-fallback { font-size: 22px; display:flex; align-items:center; justify-content:center; width:100%; height:100%; }
  .brand-item .info .name { font-size: 14px; font-weight: 500; color: var(--text); }
  .brand-item .info .slug { font-size: 11px; color: var(--text-muted); }
  .btn-remove { background: none; border: 1px solid #e74c3c; color: #e74c3c; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; flex-shrink:0; }
  .btn-remove:hover { background: #e74c3c; color: #fff; }
  .btn-sm { padding: 10px 16px; font-size: 13px; white-space: nowrap; }
  .msg { padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 13px; display: none; }
  .msg.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  .msg.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .no-auth { text-align: center; padding: 60px 20px; max-width: 500px; margin: 0 auto; }
  .no-auth h2 { color: #e74c3c; }
  .no-auth p { color: var(--text-light); margin: 14px 0 20px; }
  .brand-count { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
  .icon-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .icon-picker span { font-size: 24px; cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.15s; }
  .icon-picker span:hover { background: var(--bg-light); transform: scale(1.15); }
  .icon-picker span.selected { background: var(--primary); border-radius: 4px; }
  .back-link { display: inline-block; margin-bottom: 16px; font-size: 13px; color: var(--primary); text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
  .preview-img { width: 60px; height: 60px; border-radius: 6px; object-fit: contain; border:1px solid var(--border); margin-top:4px; display:none; }
  @media (max-width: 600px) {
    .admin-form { flex-direction: column; }
    .admin-form .field { min-width: 100%; }
    .brands-list { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="top-bar"><div class="left"><span>🚚 Free Delivery For orders above KSh 5,000/=</span></div><div class="right"><a href="account.html">Account</a><a href="shop.html">Shop</a></div></div>
<div class="header-nav-wrap">
<header>
  <a href="index.html" class="logo"><div class="logo-icon"><img src="icons/logo.svg" alt="Obwochas Pharmacy" width="44" height="44"></div><div class="logo-text"><h1>Obwocha's <span>Pharmacy</span></h1><small>Admin Panel</small></div></a>
  <div class="header-icons"><a href="account.html" class="cart-icon">👤</a></div>
</header>
<nav class="main-nav"><ul><li><a href="index.html">Home</a></li><li><a href="brands.html">Brands</a></li><li><a href="shop.html">Shop</a></li><li><a href="admin-brands.html" class="active">Manage Brands</a></li></ul></nav>
</div>

<div class="admin-panel" id="adminPanel">
</div>

<footer><div class="footer-bottom"><p>Copyright © 2026 Obwocha's Pharmacy</p></div></footer>

<script>
const ADMIN_EMAIL = 'admin@obwochaspharmacy.co.ke';

/* ========= JWT AUTH ========= */
function getToken() { return localStorage.getItem('obwochas_token'); }
function getUser() {
  try { return JSON.parse(localStorage.getItem('obwochas_user') || 'null'); }
  catch { return null; }
}

// Wrap fetch to include JWT token automatically
var _origFetch = window.fetch;
window.fetch = function(url, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  var token = getToken();
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  return _origFetch.call(window, url, opts).then(function(r) {
    if (r.status === 401) {
      localStorage.removeItem('obwochas_token');
      showMessage('Session expired. Please sign in again.', 'error');
    }
    return r;
  });
};

function getLoggedInUser() { return getUser(); }

function isAdmin() {
  const user = getUser();
  return user && user.email === ADMIN_EMAIL;
}

async function loadBrands() {
  try {
    const res = await fetch('/api/brands');
    const data = await res.json();
    return data.success ? data.brands : [];
  } catch { return []; }
}

async function deleteBrand(brandId, brandName) {
  if (!confirm('Remove "' + brandName + '" from brands?')) return;
  const token = getToken();
  if (!token) { showMessage('Please sign in first.', 'error'); renderPanel(); return; }
  try {
    const res = await fetch('/api/brands', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brandId: brandId })
    });
    const data = await res.json();
    if (data.success) { showMessage(data.message, 'success'); renderPanel(); }
    else { showMessage(data.message, 'error'); }
  } catch { showMessage('Connection error.', 'error'); }
}

async function addBrand(name, icon, image) {
  const token = getToken();
  if (!token) { showMessage('Please sign in first.', 'error'); return false; }
  try {
    const res = await fetch('/api/brands', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, icon: icon, image: image || '' })
    });
    const data = await res.json();
    if (data.success) { showMessage(data.message, 'success'); return true; }
    else { showMessage(data.message, 'error'); return false; }
  } catch { showMessage('Connection error.', 'error'); return false; }
}

function showMessage(text, type) {
  const panel = document.getElementById('adminPanel');
  var old = panel.querySelector('.msg');
  if (old) old.remove();
  const msg = document.createElement('div');
  msg.className = 'msg ' + type;
  msg.textContent = text;
  panel.insertBefore(msg, panel.firstChild);
  setTimeout(function() { if (msg.parentNode) msg.remove(); }, 4000);
}

const ICONS = ['💊','🧴','🤱','🦷','❤️','👁️','🤧','⚡','🌿','💪','💄','🩹','🧪','🧬','🏥','🌡️','🩺','💉','🧃','🫧','🧽','🪥','🧼','🍃','🏷️'];
let selectedIcon = '🏷️';

async function renderPanel() {
  const panel = document.getElementById('adminPanel');
  if (!isAdmin()) {
    panel.innerHTML = '<div class="no-auth"><h2>🔒 Admin Access Only</h2><p>You need to be logged in as the pharmacy admin to manage brands.</p><p style="font-size:12px;color:var(--text-muted);">Admin email: ' + ADMIN_EMAIL + '</p><a href="admin.html" class="btn btn-primary" style="display:inline-block;margin-top:10px;">Go to Dashboard</a></div>';
    return;
  }

  const user = getUser();
  panel.innerHTML = '<a href="index.html" class="back-link">← Back to Home</a> | <a href="admin.html" class="back-link">📦 Admin Dashboard</a><h2>⚙️ Manage Brands</h2><p style="color:var(--text-light);margin-bottom:20px;font-size:13px;">Logged in as <strong>' + (user ? user.name : 'Admin') + '</strong> (' + ADMIN_EMAIL + ') <button onclick="handleBrandsLogout()" style="background:#ffebee;color:#c62828;border:1px solid #ef9a9a;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;margin-left:6px">Sign Out</button></p><div id="msgArea"></div><div class="admin-card"><h3>➕ Add New Brand</h3><form id="addBrandForm" class="admin-form"><div class="field"><label>Brand Name</label><input type="text" id="brandName" placeholder="e.g. Panadol" required></div><div class="field" style="flex:1;min-width:200px;"><label>Brand Image URL <small style="color:var(--text-muted);">(optional)</small></label><input type="url" id="brandImage" placeholder="https://placehold.co/200x200/1a5c2e/ffffff?text=BrandName"><img class="preview-img" id="imagePreview"></div><div class="field" style="flex:0.5;min-width:100px;"><label>Icon</label><input type="text" id="brandIcon" value="🏷️" style="font-size:20px;text-align:center;" maxlength="2"><div class="icon-picker" id="iconPicker"></div></div><button type="submit" class="btn btn-primary btn-sm" style="height:40px;">Add Brand</button></form></div><div class="admin-card"><h3>📋 All Brands</h3><div class="brand-count" id="brandCount">Loading...</div><div class="brands-list" id="brandsList"><div class="loading">⏳ Loading brands...</div></div></div>';

  const iconInput = document.getElementById('brandIcon');
  const picker = document.getElementById('iconPicker');
  ICONS.forEach(function(ic) {
    var span = document.createElement('span');
    span.textContent = ic;
    span.onclick = function() {
      iconInput.value = ic;
      selectedIcon = ic;
      picker.querySelectorAll('span').forEach(function(s) { s.classList.remove('selected'); });
      span.classList.add('selected');
    };
    picker.appendChild(span);
  });
  iconInput.value = '🏷️';

  document.getElementById('brandImage').oninput = function() {
    var preview = document.getElementById('imagePreview');
    if (this.value.trim()) {
      preview.src = this.value.trim();
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  };

  var brands = await loadBrands();
  var list = document.getElementById('brandsList');
  var count = document.getElementById('brandCount');
  if (brands.length === 0) {
    list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">No brands yet. Add one above!</p>';
    count.textContent = '0 brands';
  } else {
    count.textContent = brands.length + ' brand' + (brands.length !== 1 ? 's' : '');
    list.innerHTML = brands.map(function(b) {
      var safeName = b.name.replace(/'/g, "\\'");
      return '<div class="brand-item"><div class="info"><div class="brand-img"><img src="' + (b.image || '') + '" alt="' + b.name + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" loading="lazy"><span class="icon-fallback" style="display:none">' + (b.icon || '🏷️') + '</span></div><div><div class="name">' + b.name + '</div><div class="slug">/' + b.slug + '</div></div></div><button class="btn-remove" onclick="deleteBrand(\'' + b.id + '\',\'' + safeName + '\')">✕ Remove</button></div>';
    }).join('');
  }

  document.getElementById('addBrandForm').onsubmit = async function(e) {
    e.preventDefault();
    var name = document.getElementById('brandName').value.trim();
    var icon = document.getElementById('brandIcon').value || '🏷️';
    var image = document.getElementById('brandImage').value.trim();
    if (!name) return;
    var btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Adding...';
    var success = await addBrand(name, icon, image);
    btn.disabled = false;
    btn.textContent = 'Add Brand';
    if (success) {
      document.getElementById('brandName').value = '';
      document.getElementById('brandImage').value = '';
      document.getElementById('imagePreview').style.display = 'none';
      renderPanel();
    }
  };
}

function handleBrandsLogout() {
  localStorage.removeItem('obwochas_token');
  localStorage.removeItem('obwochas_user');
  renderPanel();
}

document.addEventListener('DOMContentLoaded', renderPanel);
</script>
<script src="js/search.js" defer></script>
</body>
</html>
