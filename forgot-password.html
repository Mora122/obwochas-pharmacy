  <title>Forgot Password — Obwocha's Pharmacy</title>
  <meta name="description" content="Reset your Obwocha's Pharmacy account password.">
  <meta property="og:title" content="Forgot Password — Obwocha's Pharmacy">
  <meta property="og:url" content="https://obwochas-pharmacy.vercel.app/forgot-password.html">
  <meta property="og:type" content="website">
  <link rel="preload" href="css/style.css" as="style">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a5c2e">
  <style>
    .fp-container { max-width:500px; margin:60px auto; padding:0 20px; }
    .fp-card { background:var(--bg-light); border-radius:var(--radius); padding:30px; }
    .fp-card h2 { color:var(--primary); margin-bottom:8px; }
    .fp-card p { color:var(--text-light); font-size:14px; margin-bottom:20px; }
    #fpMessage { font-size:14px; padding:10px; border-radius:6px; margin-top:10px; display:none; }
    #fpMessage.success { display:block; background:#e8f5e9; color:#2e7d32; }
    #fpMessage.error { display:block; background:#ffebee; color:#c62828; }
    .back-link { display:inline-block; margin-top:14px; font-size:13px; color:var(--primary); }
  </style>
</head>
<body>
  <div w3-include-html="header.html"></div>

  <div class="fp-container">
    <div class="fp-card">
      <h2>🔑 Forgot Password?</h2>
      <p>Enter your email address and we'll send you a link to reset your password.</p>
      <form id="fpForm">
        <label>Email Address *</label>
        <input type="email" id="fpEmail" placeholder="you@example.com" required style="margin-bottom:14px;">
        <button type="submit" class="btn btn-primary" style="width:100%;" id="fpBtn">Send Reset Link</button>
      </form>
      <div id="fpMessage"></div>
      <div style="text-align:center;margin-top:14px;">
        <a href="account.html" class="back-link">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <div w3-include-html="footer.html"></div>

  <script src="js/include.js"></script>
  <script>
    document.getElementById('fpForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('fpEmail').value.trim();
      const btn = document.getElementById('fpBtn');
      const msg = document.getElementById('fpMessage');

      btn.disabled = true;
      btn.textContent = 'Sending...';
      msg.className = '';
      msg.style.display = 'none';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'forgot-password', email })
        });
        const data = await res.json();

        if (data.success) {
          msg.className = 'success';
          msg.textContent = data.message;
          msg.style.display = 'block';
          document.getElementById('fpForm').style.display = 'none';
          // In dev, show the reset link
          if (data.resetUrl) {
            msg.innerHTML = data.message + '<br><br><small style="word-break:break-all;">🔗 <a href="' + data.resetUrl + '" style="color:var(--primary);">Click here to reset (dev mode)</a></small>';
          }
        } else {
          msg.className = 'error';
          msg.textContent = data.message || 'Something went wrong. Please try again.';
          msg.style.display = 'block';
        }
      } catch (err) {
        msg.className = 'error';
        msg.textContent = 'Network error. Please try again.';
        msg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    });
  </script>
<script src="js/analytics.js" defer></script>
