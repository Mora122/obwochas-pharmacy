<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory Test</title>
<style>
body{font-family:sans-serif;background:#f0f2f5;margin:20px}
#result{padding:20px;border-radius:8px;white-space:pre-wrap}
.good{background:#e8f5e9;color:#1a5c2e;border:2px solid #1a5c2e}
.bad{background:#ffebee;color:#c62828;border:2px solid #c62828}
.load{background:#fff;color:#999;border:1px solid #ddd}
button{padding:10px 25px;font-size:16px;background:#1a5c2e;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:10px 0}
</style>
</head>
<body>
<h2>🔬 Inventory Test Page</h2>
<p>This page loads inventory data from the SAME API as the admin panel.</p>
<button onclick="testInventory()">📦 Load Inventory</button>
<button onclick="testPing()">🏓 Ping API</button>
<button onclick="testRawFetch()">🌐 Raw Fetch</button>
<div id="result" class="good">Ready. Click a button.</div>
<script>
var API = '/api';

function testPing() {
  var r = document.getElementById('result');
  r.className = 'load';
  r.textContent = 'Pinging API...';
  fetch(API + '/products?limit=1')
    .then(function(res) {
      r.className = res.ok ? 'good' : 'bad';
      return res.text();
    })
    .then(function(text) {
      r.textContent = 'Status OK. Response: ' + text.substring(0, 200);
    })
    .catch(function(err) {
      r.className = 'bad';
      r.textContent = 'FETCH ERROR: ' + err.message + '\n' + err.stack;
    });
}

function testRawFetch() {
  var r = document.getElementById('result');
  r.className = 'load';
  r.textContent = 'Fetching...';
  
  // Try with absolute URL too
  var url = window.location.origin + '/api/products?all=true';
  fetch(url, {cache: 'no-store'})
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(d) {
      r.className = 'good';
      var info = 'SUCCESS!\n';
      info += 'Has success flag: ' + d.success + '\n';
      info += 'Products count: ' + (d.products ? d.products.length : 0) + '\n';
      if (d.products && d.products.length > 0) {
        info += 'First product: ' + d.products[0].name + '\n';
        info += 'Total stock: ' + d.products.reduce(function(s,p){return s+(p.stock||0);},0);
      }
      r.textContent = info;
    })
    .catch(function(err) {
      r.className = 'bad';
      r.textContent = 'ERROR: ' + err.message + '\n' + (err.stack || '');
    });
}

function testInventory() {
  var r = document.getElementById('result');
  r.className = 'load';
  r.textContent = 'Loading... (step 1 - before fetch)';
  
  var el = document.getElementById('result');
  el.textContent = 'Step 2 - starting fetch...';
  
  fetch(API + '/products?all=true')
    .then(function(resp) {
      el.textContent = 'Step 3 - got response, parsing JSON...';
      return resp.json();
    })
    .then(function(data) {
      el.className = 'good';
      var html = '✅ Step 4 - Data loaded!\n\n';
      html += 'Products: ' + (data.products ? data.products.length : 0) + '\n';
      html += 'Success: ' + data.success + '\n\n';
      if (data.products && data.products.length > 0) {
        html += 'First 5 products:\n';
        for (var i = 0; i < Math.min(5, data.products.length); i++) {
          html += (i+1) + '. ' + data.products[i].name + ' - KSh ' + data.products[i].price + ' (stock: ' + data.products[i].stock + ')\n';
        }
      }
      el.textContent = html;
    })
    .catch(function(err) {
      el.className = 'bad';
      el.textContent = '❌ ERROR at step ' + (el.textContent.match(/(\d+)/) || ['?'])[0] + ': ' + err.message + '\n\nStack:\n' + (err.stack || '');
    });
}
</script>
<script src="js/analytics.js" defer></script>
</body>
</html>
