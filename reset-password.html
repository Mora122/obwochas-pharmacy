<!DOCTYPE html>
<html lang="en">
<head>

  <title>Reset Password — Obwocha's Pharmacy</title>
  <meta name="description" content="Set a new password for your Obwocha's Pharmacy account.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="Reset Password — Obwocha's Pharmacy">
  <meta property="og:url" content="https://obwochas-pharmacy.vercel.app/reset-password.html">
  <link rel="preload" href="css/style.css" as="style">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a5c2e">
  <style>
    .rp-container { max-width:500px; margin:60px auto; padding:0 20px; }
    .rp-card { background:var(--bg-light); border-radius:var(--radius); padding:30px; }
    .rp-card h2 { color:var(--primary); margin-bottom:8px; }
    .rp-card p { color:var(--text-light); font-size:14px; margin-bottom:20px; }
    #rpMessage { font-size:14px; padding:10px; border-radius:6px; margin-top:10px; display:none; }
    #rpMessage.success { display:block; background:#e8f5e9; color:#2e7d32; }
    #rpMessage.error { display:block; background:#ffebee; color:#c62828; }
  </style>
</head>
<body>
  <div w3-include-html="header.html"></div>

  <div class="rp-container">
    <div class="rp-card" id="rpCard">
      <h2>🔐 Reset Your Password</h2>
      <p>Enter your new password below.</p>
      <form id="rpForm">
        <label>New Password *</label>
        <div style="position:relative;display:flex;align-items:stretch;width:100%;">
          <input type="password" id="rpPassword" placeholder="Min. 8 characters" minlength="8" required>
          <button type="button" onclick="togglePw('rpPassword')" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;line-height:1;color:#666;" title="Show password">👁</button>
        </div>
        <label style="margin-top:10px;">Confirm Password *</label>
        <div style="position:relative;display:flex;align-items:stretch;width:100%;">
          <input type="password" id="rpConfirm" placeholder="Repeat password" required>
          <button type="button" onclick="togglePw('rpConfirm')" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;line-height:1;color:#666;" title="Show password">👁</button>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:14px;" id="rpBtn">Reset Password</button>
      </form>
      <div id="rpMessage"></div>
      <div style="text-align:center;margin-top:14px;">
        <a href="account.html" class="back-link" style="display:inline-block;font-size:13px;color:var(--primary);">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <div w3-include-html="footer.html"></div>

  <script src="js/include.js"></script>
  <script>
    // Get token and email from URL
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');
    const resetEmail = urlParams.get('email');

    if (!resetToken || !resetEmail) {
      document.getElementById('rpCard').innerHTML = `
        <h2>🔐 Invalid Link</h2>
        <p>This password reset link is invalid or missing required parameters.</p>
        <div style="text-align:center;margin-top:20px;">
          <a href="forgot-password.html" class="btn btn-primary" style="display:inline-block;text-decoration:none;padding:10px 24px;">Request New Reset Link</a>
        </div>
        <div style="text-align:center;margin-top:14px;">
          <a href="account.html" style="color:var(--primary);font-size:13px;">← Back to Sign In</a>
        </div>
      `;
    }

    function togglePw(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('rpForm')?.addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('rpPassword').value;
      const confirm = document.getElementById('rpConfirm').value;

      if (password !== confirm) {
        const msg = document.getElementById('rpMessage');
        msg.className = 'error';
        msg.textContent = 'Passwords do not match. Please try again.';
        msg.style.display = 'block';
        return;
      }

      if (password.length < 8) {
        const msg = document.getElementById('rpMessage');
        msg.className = 'error';
        msg.textContent = 'Password must be at least 8 characters.';
        msg.style.display = 'block';
        return;
      }

      const btn = document.getElementById('rpBtn');
      const msg = document.getElementById('rpMessage');

      btn.disabled = true;
      btn.textContent = 'Resetting...';
      msg.className = '';
      msg.style.display = 'none';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'reset-password', token: resetToken, email: resetEmail, password })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('rpForm').style.display = 'none';
          msg.className = 'success';
          msg.innerHTML = '✅ ' + data.message + '<br><br><a href="account.html" class="btn btn-primary" style="display:inline-block;text-decoration:none;padding:10px 24px;">Sign In</a>';
          msg.style.display = 'block';
        } else {
          msg.className = 'error';
          msg.textContent = data.message || 'Something went wrong.';
          msg.style.display = 'block';
        }
      } catch (err) {
        msg.className = 'error';
        msg.textContent = 'Network error. Please try again.';
        msg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Reset Password';
    });
  </script>
<script src="js/analytics.js" defer></script>
