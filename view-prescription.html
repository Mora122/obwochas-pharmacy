<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prescription - Obwocha's Pharmacy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      padding: 24px;
      margin-top: 24px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    .header h1 {
      font-size: 18px;
      color: #1b5e20;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #1b5e20;
      padding: 4px;
    }
    .details { margin-bottom: 20px; }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .detail-label { color: #888; }
    .detail-value { font-weight: 500; color: #333; }
    .image-container {
      margin-top: 16px;
      background: #f9f9f9;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .image-container img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 8px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.1);
    }
    .image-container p {
      color: #999;
      padding: 40px 0;
      font-size: 14px;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: #fff3cd;
      color: #856404;
    }
    .status-badge.reviewed { background: #d4edda; color: #155724; }
    .loading { text-align: center; padding: 40px; color: #999; }
    .error { text-align: center; padding: 40px; color: #e53935; }
    .meta { font-size: 12px; color: #bbb; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="container" id="root">
    <div class="loading">Loading prescription...</div>
  </div>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const root = document.getElementById('root');

      if (!id) {
        root.innerHTML = '<div class="error">❌ No prescription ID provided</div>';
        return;
      }

      try {
        const res = await fetch('/api/prescription?id=' + encodeURIComponent(id));
        const data = await res.json();

        if (!data.success || !data.prescription) {
          root.innerHTML = '<div class="error">❌ Prescription not found or has expired</div>';
          return;
        }

        const p = data.prescription;
        const date = new Date(p.createdAt);
        const statusClass = p.status === 'reviewed' ? 'reviewed' : '';

        root.innerHTML = `
          <div class="header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1>Prescription #${p.id.slice(-6).toUpperCase()}</h1>
            <span class="status-badge ${statusClass}" style="margin-left:auto">${p.status}</span>
          </div>
          <div class="details">
            <div class="detail-row"><span class="detail-label">Patient</span><span class="detail-value">${escapeHtml(p.name)}</span></div>
            <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${escapeHtml(p.phone)}</span></div>
            <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${escapeHtml(p.email || '—')}</span></div>
            <div class="detail-row"><span class="detail-label">Delivery</span><span class="detail-value">${escapeHtml(p.deliveryMethod)}</span></div>
            <div class="detail-row"><span class="detail-label">Store</span><span class="detail-value">${escapeHtml(p.nearestStore || '—')}</span></div>
            <div class="detail-row"><span class="detail-label">Submitted</span><span class="detail-value">${date.toLocaleDateString()} ${date.toLocaleTimeString()}</span></div>
            ${p.notes ? `<div class="detail-row"><span class="detail-label">Notes</span><span class="detail-value">${escapeHtml(p.notes)}</span></div>` : ''}
            <div class="detail-row"><span class="detail-label">File</span><span class="detail-value">${escapeHtml(p.fileName)} (${p.fileSize}KB)</span></div>
          </div>
          <div class="image-container">
            ${p.fileData ? `<img src="${p.fileData}" alt="Prescription" />` : '<p>No image available</p>'}
          </div>
          <div class="meta">Prescription ID: ${p.id} | Submitted via Obwocha's Pharmacy</div>
        `;
      } catch (err) {
        root.innerHTML = '<div class="error">❌ Error loading prescription. Check your connection.</div>';
      }

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
    })();
  </script>
</body>
</html>
